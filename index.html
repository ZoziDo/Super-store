<!-- templates/index.html -->
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIM Market Admin</title>
    <link rel="manifest" href="/static/manifest.json">
    <style>
        /* Стили для мобильной версии */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0A0A0F;
            color: #D0D0E0;
            padding: 16px;
            padding-bottom: 80px;
        }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
        }
        
        .header {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #2a2a4a;
        }
        
        .header h1 {
            color: #8B5CF6;
            font-size: 24px;
        }
        
        .header .subtitle {
            color: #555566;
            font-size: 14px;
            margin-top: 5px;
        }
        
        .status-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
            flex-wrap: wrap;
        }
        
        .status-badge {
            display: inline-flex;
            align-items: center;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }
        
        .status-online {
            background: #00FFAA;
            color: #000;
        }
        
        .status-offline {
            background: #FF4D7A;
            color: #fff;
        }
        
        .status-paused {
            background: #FFA500;
            color: #000;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .stat-card {
            background: #14141F;
            padding: 15px;
            border-radius: 8px;
            border-left: 3px solid #8B5CF6;
        }
        
        .stat-card .label {
            color: #555566;
            font-size: 12px;
        }
        
        .stat-card .value {
            color: #F0F0FF;
            font-size: 22px;
            font-weight: bold;
            margin-top: 5px;
        }
        
        .card {
            background: #14141F;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
        }
        
        .card h2 {
            color: #8B5CF6;
            font-size: 16px;
            margin-bottom: 12px;
        }
        
        .player-item {
            display: flex;
            flex-direction: column;
            padding: 12px;
            border-bottom: 1px solid #1F1F2E;
            gap: 8px;
        }
        
        .player-item:last-child {
            border-bottom: none;
        }
        
        .player-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 5px;
        }
        
        .player-name {
            color: #F0F0FF;
            font-weight: bold;
            font-size: 16px;
        }
        
        .player-balance {
            color: #00E5C9;
        }
        
        .player-ema {
            color: #FF6347;
        }
        
        .player-badges {
            display: flex;
            gap: 5px;
        }
        
        .badge {
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: bold;
        }
        
        .badge-admin {
            background: #8B5CF6;
            color: #fff;
        }
        
        .badge-banned {
            background: #FF4D7A;
            color: #fff;
        }
        
        .player-controls {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-top: 5px;
        }
        
        .player-controls input {
            width: 60px;
            padding: 5px;
            background: #0A0A0F;
            border: 1px solid #1F1F2E;
            color: #F0F0FF;
            border-radius: 4px;
            font-size: 12px;
        }
        
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn:active {
            transform: scale(0.95);
        }
        
        .btn-primary {
            background: #8B5CF6;
            color: #fff;
        }
        
        .btn-success {
            background: #00FFAA;
            color: #000;
        }
        
        .btn-danger {
            background: #FF4D7A;
            color: #fff;
        }
        
        .btn-warning {
            background: #FFA500;
            color: #000;
        }
        
        .btn-sm {
            padding: 5px 12px;
            font-size: 12px;
        }
        
        .tab-bar {
            display: flex;
            gap: 5px;
            margin-bottom: 16px;
            background: #14141F;
            border-radius: 12px;
            padding: 5px;
            overflow-x: auto;
        }
        
        .tab {
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
            white-space: nowrap;
            font-size: 14px;
            color: #555566;
        }
        
        .tab.active {
            background: #8B5CF6;
            color: #fff;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        .form-group {
            margin-bottom: 12px;
        }
        
        .form-group label {
            display: block;
            color: #555566;
            font-size: 12px;
            margin-bottom: 4px;
        }
        
        .form-group input {
            width: 100%;
            padding: 10px;
            background: #0A0A0F;
            border: 1px solid #1F1F2E;
            color: #F0F0FF;
            border-radius: 8px;
            font-size: 14px;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        
        .search-box {
            width: 100%;
            padding: 10px;
            background: #0A0A0F;
            border: 1px solid #1F1F2E;
            color: #F0F0FF;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 10px;
        }
        
        .logs-container {
            background: #0A0A0F;
            border-radius: 8px;
            padding: 10px;
            max-height: 300px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 11px;
        }
        
        .log-entry {
            padding: 4px 0;
            border-bottom: 1px solid #1F1F2E;
        }
        
        .log-time {
            color: #555566;
        }
        
        .log-info {
            color: #00E5C9;
        }
        
        .log-warn {
            color: #FFA500;
        }
        
        .log-success {
            color: #00FFAA;
        }
        
        .log-error {
            color: #FF4D7A;
        }
        
        .float-actions {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #14141F;
            padding: 12px 16px;
            display: flex;
            gap: 10px;
            justify-content: center;
            border-top: 1px solid #1F1F2E;
            z-index: 100;
        }
        
        .float-actions .btn {
            flex: 1;
            max-width: 150px;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            align-items: center;
            justify-content: center;
            z-index: 200;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: #14141F;
            padding: 24px;
            border-radius: 16px;
            max-width: 400px;
            width: 90%;
            margin: 20px;
        }
        
        .modal-content h2 {
            color: #8B5CF6;
            margin-bottom: 12px;
        }
        
        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 16px;
        }
        
        .modal-buttons .btn {
            flex: 1;
        }
        
        @media (max-width: 400px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }
            
            .form-row {
                grid-template-columns: 1fr;
            }
            
            .player-row {
                flex-direction: column;
                align-items: stretch;
            }
            
            .player-controls {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>🛒 PIM Market</h1>
            <div class="subtitle">Управление магазином</div>
            <div class="status-bar">
                <span id="serverStatus" class="status-badge status-offline">⏳ Загрузка...</span>
                <span id="playerCount" style="color: #555566; font-size: 14px;">👥 0 онлайн</span>
            </div>
        </div>
        
        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="label">👥 Игроков</div>
                <div class="value" id="totalPlayers">0</div>
            </div>
            <div class="stat-card">
                <div class="label">💰 Транзакций</div>
                <div class="value" id="totalTransactions">0</div>
            </div>
        </div>
        
        <!-- Tabs -->
        <div class="tab-bar">
            <div class="tab active" onclick="switchTab('players')">👥 Игроки</div>
            <div class="tab" onclick="switchTab('items')">📦 Предметы</div>
            <div class="tab" onclick="switchTab('admins')">👑 Админы</div>
            <div class="tab" onclick="switchTab('logs')">📋 Логи</div>
        </div>
        
        <!-- Players Tab -->
        <div id="tab-players" class="tab-content active">
            <div class="card">
                <div style="display: flex; gap: 10px; margin-bottom: 12px;">
                    <input type="text" class="search-box" id="playerSearch" placeholder="🔍 Поиск игрока..." oninput="filterPlayers()">
                    <button class="btn btn-primary btn-sm" onclick="refreshData()">🔄</button>
                </div>
                <div id="playersList"></div>
            </div>
        </div>
        
        <!-- Items Tab -->
        <div id="tab-items" class="tab-content">
            <div class="card">
                <h2>➕ Добавить предмет</h2>
                <form id="addItemForm" onsubmit="addItem(event)">
                    <div class="form-group">
                        <label>Internal Name (minecraft:diamond)</label>
                        <input type="text" id="itemInternal" required placeholder="minecraft:diamond">
                    </div>
                    <div class="form-group">
                        <label>Display Name</label>
                        <input type="text" id="itemDisplay" required placeholder="Алмаз">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Цена Coina ₵</label>
                            <input type="number" id="itemPriceCoin" step="0.01" value="0">
                        </div>
                        <div class="form-group">
                            <label>Цена ЭМЫ ۞</label>
                            <input type="number" id="itemPriceEma" step="0.01" value="0">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Damage (0 если нет)</label>
                        <input type="number" id="itemDamage" value="0">
                    </div>
                    <button type="submit" class="btn btn-success" style="width:100%">➕ Добавить предмет</button>
                </form>
            </div>
        </div>
        
        <!-- Admins Tab -->
        <div id="tab-admins" class="tab-content">
            <div class="card">
                <h2>👑 Администраторы</h2>
                <div style="display: flex; gap: 10px; margin-bottom: 12px;">
                    <input type="text" id="adminName" placeholder="Ник игрока" style="flex:1; padding: 10px; background: #0A0A0F; border: 1px solid #1F1F2E; color: #F0F0FF; border-radius: 8px;">
                    <button class="btn btn-success" onclick="addAdmin()">➕</button>
                </div>
                <div id="adminsList"></div>
            </div>
        </div>
        
        <!-- Logs Tab -->
        <div id="tab-logs" class="tab-content">
            <div class="card">
                <h2>📋 Логи</h2>
                <div class="logs-container" id="logsContainer">
                    <div class="log-entry"><span class="log-time">[--:--:--]</span> <span class="log-info">Загрузка логов...</span></div>
                </div>
                <button class="btn btn-primary" onclick="refreshLogs()" style="width:100%; margin-top:10px;">🔄 Обновить</button>
            </div>
        </div>
    </div>
    
    <!-- Floating Actions -->
    <div class="float-actions">
        <button class="btn btn-warning" onclick="togglePause()">⏸️ Пауза</button>
        <button class="btn btn-primary" onclick="refreshData()">🔄 Обновить</button>
        <button class="btn btn-danger" onclick="killMarket()">⛔ Завершить</button>
    </div>
    
    <!-- Modal -->
    <div id="confirmModal" class="modal">
        <div class="modal-content">
            <h2>⚠️ Подтверждение</h2>
            <p id="confirmMessage">Вы уверены?</p>
            <div class="modal-buttons">
                <button class="btn" onclick="closeModal()">Отмена</button>
                <button class="btn btn-danger" id="confirmBtn">Подтвердить</button>
            </div>
        </div>
    </div>
    
    <script>
        let confirmCallback = null;
        let allPlayers = [];
        let adminsList = [];
        
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelector(`.tab[onclick="switchTab('${tab}')"]`).classList.add('active');
            document.getElementById(`tab-${tab}`).classList.add('active');
        }
        
        function showConfirm(message, callback) {
            document.getElementById('confirmMessage').textContent = message;
            document.getElementById('confirmModal').classList.add('active');
            confirmCallback = callback;
        }
        
        function closeModal() {
            document.getElementById('confirmModal').classList.remove('active');
            confirmCallback = null;
        }
        
        document.getElementById('confirmBtn').onclick = function() {
            if (confirmCallback) {
                confirmCallback();
            }
            closeModal();
        };
        
        async function apiRequest(endpoint, data = null) {
            const options = {
                method: data ? 'POST' : 'GET',
                headers: { 'Content-Type': 'application/json' }
            };
            if (data) {
                options.body = JSON.stringify(data);
            }
            try {
                const response = await fetch(endpoint, options);
                return await response.json();
            } catch (e) {
                console.error('API Error:', e);
                return { error: 'Network error' };
            }
        }
        
        function filterPlayers() {
            const search = document.getElementById('playerSearch').value.toLowerCase();
            renderPlayers(search);
        }
        
        function renderPlayers(search = '') {
            const list = document.getElementById('playersList');
            const filtered = allPlayers.filter(p => 
                p.name.toLowerCase().includes(search)
            );
            
            if (filtered.length === 0) {
                list.innerHTML = '<div style="text-align:center;padding:20px;color:#555566;">Нет игроков</div>';
                return;
            }
            
            let html = '';
            for (const player of filtered) {
                const isAdmin = adminsList.includes(player.name);
                html += `
                    <div class="player-item">
                        <div class="player-row">
                            <div>
                                <span class="player-name">${player.name}</span>
                                <div class="player-badges">
                                    ${isAdmin ? '<span class="badge badge-admin">Админ</span>' : ''}
                                    ${player.banned ? '<span class="badge badge-banned">Забанен</span>' : ''}
                                </div>
                            </div>
                            <div>
                                <span class="player-balance">₵ ${(player.balance || 0).toFixed(2)}</span>
                                <span class="player-ema">۞ ${(player.emaBalance || 0).toFixed(2)}</span>
                            </div>
                        </div>
                        <div class="player-controls">
                            <input type="number" id="balance_${player.name}" step="0.01" placeholder="Coina" style="width:70px;">
                            <input type="number" id="ema_${player.name}" step="0.01" placeholder="ЭМЫ" style="width:70px;">
                            <button class="btn btn-primary btn-sm" onclick="setBalance('${player.name}')">💳</button>
                            <button class="btn ${player.banned ? 'btn-success' : 'btn-danger'} btn-sm" onclick="toggleBan('${player.name}')">
                                ${player.banned ? '🔓' : '🔒'}
                            </button>
                            <button class="btn btn-danger btn-sm" onclick="resetPlayer('${player.name}')">🔄</button>
                        </div>
                    </div>
                `;
            }
            list.innerHTML = html;
        }
        
        async function refreshData() {
            const data = await apiRequest('/api/players');
            if (data.error) {
                console.error('Error loading data:', data.error);
                return;
            }
            
            allPlayers = data.players || [];
            adminsList = data.admins || [];
            
            document.getElementById('totalPlayers').textContent = data.total || 0;
            document.getElementById('totalTransactions').textContent = data.total_transactions || 0;
            document.getElementById('playerCount').textContent = `👥 ${data.online || 0} онлайн`;
            
            updateStatus(data.paused);
            renderPlayers(document.getElementById('playerSearch').value);
        }
        
        function updateStatus(paused) {
            const status = document.getElementById('serverStatus');
            if (paused) {
                status.textContent = '⏸️ Приостановлен';
                status.className = 'status-badge status-paused';
            } else {
                status.textContent = '🟢 Онлайн';
                status.className = 'status-badge status-online';
            }
        }
        
        async function setBalance(name) {
            const coin = document.getElementById(`balance_${name}`).value;
            const ema = document.getElementById(`ema_${name}`).value;
            if (!coin && !ema) return;
            
            const data = await apiRequest('/api/balance', {
                name: name,
                coin: parseFloat(coin) || 0,
                ema: parseFloat(ema) || 0
            });
            if (data.success) {
                refreshData();
            } else {
                alert('Ошибка: ' + (data.error || 'Неизвестная ошибка'));
            }
        }
        
        async function toggleBan(name) {
            showConfirm(`Забанить/разбанить ${name}?`, async () => {
                const data = await apiRequest('/api/ban', { name: name });
                if (data.success) {
                    refreshData();
                }
            });
        }
        
        async function resetPlayer(name) {
            showConfirm(`Сбросить ${name}?`, async () => {
                const data = await apiRequest('/api/reset', { name: name });
                if (data.success) {
                    refreshData();
                }
            });
        }
        
        async function togglePause() {
            const data = await apiRequest('/api/pause');
            if (data.success) {
                updateStatus(data.paused);
                refreshData();
            }
        }
        
        async function killMarket() {
            showConfirm('⚠️ Завершить все терминалы?', async () => {
                const data = await apiRequest('/api/kill');
                if (data.success) {
                    alert('Команда отправлена');
                }
            });
        }
        
        async function addItem(e) {
            e.preventDefault();
            const data = await apiRequest('/api/additem', {
                internal: document.getElementById('itemInternal').value,
                display: document.getElementById('itemDisplay').value,
                price_coin: parseFloat(document.getElementById('itemPriceCoin').value) || 0,
                price_ema: parseFloat(document.getElementById('itemPriceEma').value) || 0,
                damage: parseInt(document.getElementById('itemDamage').value) || 0
            });
            if (data.success) {
                alert('✅ Предмет добавлен!');
                document.getElementById('addItemForm').reset();
            } else {
                alert('❌ Ошибка: ' + (data.error || 'Неизвестная ошибка'));
            }
        }
        
        async function addAdmin() {
            const name = document.getElementById('adminName').value.trim();
            if (!name) return;
            const data = await apiRequest('/api/addadmin', { name: name });
            if (data.success) {
                document.getElementById('adminName').value = '';
                refreshAdmins();
                refreshData();
            } else {
                alert('Ошибка: ' + (data.error || 'Неизвестная ошибка'));
            }
        }
        
        async function removeAdmin(name) {
            showConfirm(`Удалить ${name} из админов?`, async () => {
                const data = await apiRequest('/api/removeadmin', { name: name });
                if (data.success) {
                    refreshAdmins();
                    refreshData();
                }
            });
        }
        
        async function refreshAdmins() {
            const data = await apiRequest('/api/admins');
            const list = document.getElementById('adminsList');
            if (data.admins && data.admins.length > 0) {
                let html = '';
                for (const admin of data.admins) {
                    html += `
                        <div class="player-item">
                            <div class="player-row">
                                <span class="player-name">👑 ${admin}</span>
                                ${data.admins.length > 1 ? `<button class="btn btn-danger btn-sm" onclick="removeAdmin('${admin}')">🗑️</button>` : '<span style="color:#555566;font-size:12px;">Нельзя удалить последнего</span>'}
                            </div>
                        </div>
                    `;
                }
                list.innerHTML = html;
            } else {
                list.innerHTML = '<div style="text-align:center;padding:20px;color:#555566;">Нет администраторов</div>';
            }
        }
        
        async function refreshLogs() {
            const data = await apiRequest('/api/logs');
            const container = document.getElementById('logsContainer');
            if (data.logs && data.logs.length > 0) {
                let html = '';
                for (const log of data.logs) {
                    const colorClass = log.level === 'INFO' ? 'log-info' : 
                                     log.level === 'WARN' ? 'log-warn' : 
                                     log.level === 'SUCCESS' ? 'log-success' : 
                                     log.level === 'ERROR' ? 'log-error' : 'log-info';
                    html += `<div class="log-entry"><span class="log-time">[${log.time}]</span> <span class="${colorClass}">${log.text}</span></div>`;
                }
                container.innerHTML = html;
            } else {
                container.innerHTML = '<div class="log-entry">Нет логов</div>';
            }
        }
        
        // Auto-refresh
        setInterval(() => {
            refreshData();
        }, 10000);
        
        // Initial load
        refreshData();
        refreshAdmins();
        refreshLogs();
    </script>
</body>
</html>
